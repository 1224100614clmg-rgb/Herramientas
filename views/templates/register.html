<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Sistema de Herramientas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1565c0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1565c0;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            background: #1565c0;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0d47a1;
        }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            text-decoration: none;
            color: #1565c0;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Crear Cuenta</h2>

    <form action="{{ url_for('register') }}" method="POST">

        <div class="form-group">
            <label>Número de Control</label>
            <input type="text" name="numero_control" required pattern="[0-9]+">
        </div>

        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" name="nombre_completo" required>
        </div>

        <div class="form-group">
            <label>Correo Institucional</label>
            <input type="email" name="correo" required>
        </div>

        <div class="form-group">
            <label>Carrera</label>
            <select name="carrera" required>
                <option value="">Seleccionar</option>
                <option value="mecatronica">Mecatrónica</option>
                <option value="energias Renovables">Energías Renovables</option>
                <option value="industrial">Industrial</option>
            </select>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="contrasena" required minlength="8">
        </div>

        <div class="form-group">
            <label>Confirmar Contraseña</label>
            <input type="password" name="confirmar_contrasena" required minlength="8">
        </div>

         {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <button type="submit">Registrarse</button>

    </form>

    <div class="link">
        ¿Ya tienes cuenta? <a href="{{ url_for('index') }}">Inicia sesión</a>
    </div>
</div>

</body>
</html>
