<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Herramientas - UTNG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            max-width: 1100px;
            width: 90%;
        }

        /* Panel izquierdo - Formulario */
        .login-panel {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-width: 80px;
            height: auto;
            margin-bottom: 15px;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-text h1 {
            font-size: 28px;
            color: #1a237e;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .user-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #5c6bc0 0%, #3949ab 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(92, 107, 192, 0.3);
        }

        .user-icon svg {
            width: 45px;
            height: 45px;
            fill: white;
        }

        .section-title {
            text-align: center;
            font-size: 24px;
            color: #1565c0;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #424242;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            width: 20px;
            height: 20px;
            fill: #757575;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1565c0;
            background: white;
            box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.1);
        }

        .forgot-password {
            text-align: center;
            margin: 10px 0 25px 0;
        }

        .forgot-password a {
            color: #616161;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #1565c0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(21, 101, 192, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #1565c0;
            border: 2px solid #1565c0;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: #757575;
            font-size: 13px;
        }

        /* Panel derecho - Ilustración */
        .illustration-panel {
            flex: 0.8;
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .illustration-panel::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }

        .illustration-panel::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
        }

        .illustration-content {
            text-align: center;
            z-index: 1;
        }

        .tools-illustration {
            width: 100%;
            max-width: 300px;
            margin-bottom: 30px;
        }

        .illustration-svg {
            width: 100%;
            height: auto;
        }

        .illustration-content h2 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .illustration-content p {
            font-size: 16px;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .container {
                flex-direction: column;
            }

            .illustration-panel {
                padding: 40px 30px;
            }

            .login-panel {
                padding: 40px 30px;
            }
        }

        @media (max-width: 480px) {
            .login-panel {
                padding: 30px 20px;
            }

            .welcome-text h1 {
                font-size: 24px;
            }

            .section-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Panel de Login -->
        <div class="login-panel">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='img/logo_utng.jpg') }}" alt="Logo UTNG">
            </div>

            <div class="welcome-text">
                <h1>Bienvenido</h1>
            </div>

            <div class="user-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
            </div>

            <h2 class="section-title">INICIO DE SESIÓN</h2>


            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        <input type="text" id="usuario" name="usuario" required placeholder="Ingrese su usuario">
                    </div>
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                        <input type="password" id="contrasena" name="contrasena" required placeholder="Ingrese su contraseña">
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="{{ url_for('forgot_password') }}">¿Olvidó su contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary">Iniciar</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='{{ url_for('register') }}'">Registrarse</button>
            </form>

            <div class="footer-text">
                © 2026 UTNG - Todos los derechos reservados
            </div>
        </div>

        <!-- Panel de Ilustración -->
        <div class="illustration-panel">
            <div class="illustration-content">
                <div class="tools-illustration">
                    <svg class="illustration-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
                        <!-- Monitor/Pantalla -->
                        <rect x="80" y="80" width="180" height="120" rx="8" fill="#ffffff" stroke="#e3f2fd" stroke-width="3"/>
                        <rect x="90" y="90" width="160" height="100" rx="4" fill="#1e88e5"/>
                        
                        <!-- Líneas de código en pantalla -->
                        <line x1="100" y1="105" x2="180" y2="105" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
                        <line x1="100" y1="120" x2="160" y2="120" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
                        <line x1="100" y1="135" x2="200" y2="135" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
                        <line x1="100" y1="150" x2="170" y2="150" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
                        <line x1="100" y1="165" x2="190" y2="165" stroke="#81c784" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Gráfica en pantalla -->
                        <polyline points="195,160 205,150 215,155 225,140 235,145" fill="none" stroke="#81c784" stroke-width="2"/>
                        
                        <!-- Base del monitor -->
                        <rect x="150" y="200" width="40" height="15" fill="#ffffff"/>
                        <rect x="130" y="215" width="80" height="8" rx="4" fill="#ffffff"/>
                        
                        <!-- Multímetro -->
                        <rect x="90" y="240" width="90" height="120" rx="8" fill="#263238" stroke="#ffffff" stroke-width="2"/>
                        
                        <!-- Pantalla del multímetro -->
                        <rect x="105" y="260" width="60" height="35" rx="3" fill="#ffffff"/>
                        <text x="135" y="282" font-family="monospace" font-size="14" fill="#e53935" text-anchor="middle" font-weight="bold">88.8</text>
                        
                        <!-- Indicador LED -->
                        <circle cx="115" cy="310" r="5" fill="#ff5252"/>
                        
                        <!-- Botones del multímetro -->
                        <circle cx="115" cy="330" r="8" fill="#1565c0"/>
                        <circle cx="135" cy="330" r="8" fill="#fdd835"/>
                        <circle cx="155" cy="330" r="8" fill="#7cb342"/>
                        
                        <!-- Selector rotatorio -->
                        <circle cx="135" cy="350" r="6" fill="#ffffff"/>
                        
                        <!-- Cables/Conectores -->
                        <path d="M 180 270 Q 200 260 210 250" stroke="#e53935" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <circle cx="210" cy="250" r="6" fill="#e53935"/>
                        
                        <path d="M 180 290 Q 200 300 210 310" stroke="#212121" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <circle cx="210" cy="310" r="6" fill="#212121"/>
                        
                        <!-- Destornillador -->
                        <rect x="230" y="280" width="12" height="60" rx="2" fill="#fdd835"/>
                        <polygon points="236,340 230,360 242,360" fill="#9e9e9e"/>
                        
                        <!-- Pinzas/Alicate -->
                        <ellipse cx="270" y="300" rx="8" ry="15" fill="#e53935"/>
                        <ellipse cx="280" y="300" rx="8" ry="15" fill="#e53935"/>
                        <rect x="266" y="285" width="4" height="40" fill="#c62828"/>
                        <rect x="280" y="285" width="4" height="40" fill="#c62828"/>
                        
                        <!-- Herramienta adicional -->
                        <path d="M 300 330 L 310 320 L 315 325 L 305 335 Z" fill="#ff6f00"/>
                        <rect x="305" y="335" width="6" height="25" fill="#bf360c"/>
                        
                        <!-- Iconos decorativos de engranajes -->
                        <circle cx="50" cy="100" r="15" fill="rgba(255,255,255,0.2)" stroke="#ffffff" stroke-width="2"/>
                        <circle cx="50" cy="100" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
                        
                        <circle cx="330" cy="350" r="12" fill="rgba(255,255,255,0.15)" stroke="#ffffff" stroke-width="2"/>
                        <circle cx="330" cy="350" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
                    </svg>
                </div>
                
                <h2>Sistema de Gestión de Herramientas</h2>
                <p>Universidad Tecnológica del Norte de Guanajuato</p>
            </div>
        </div>
    </div>
</body>
</html>
